name: Feature Request
description: Suggest an improvement to the open harness
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests for kernel scoring/branching internals will be redirected to Pheo Inc. commercial channels.
        See [docs/kernel-boundary.md](../../docs/kernel-boundary.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Layer
      options:
        - Harness (SDK/CLI/API/UI)
        - Connector / integration
        - Documentation / examples
        - Packaging / deployment
        - Kernel (commercial)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
