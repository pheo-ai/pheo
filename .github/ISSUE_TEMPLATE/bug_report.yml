name: Bug Report
description: Report a defect in the Pheo harness or packaged runtime
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For security issues, see [SECURITY.md](../../SECURITY.md) and report privately.

  - type: input
    id: version
    attributes:
      label: Pheo version
      placeholder: "0.1.13"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - SDK
        - REST API
        - MCP
        - Local UI
        - Packaging / install
        - Kernel runtime
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands or minimal code if possible.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets before posting.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I removed secrets, API keys, and customer data from this report
          required: true
