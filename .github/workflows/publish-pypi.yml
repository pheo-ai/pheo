name: Publish to PyPI/TestPyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: Publish target
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

env:
  PYTHON_VERSION: "3.13"

jobs:
  publish:
    runs-on: ubuntu-latest
    # Trusted publishing requires a matching GitHub Environment on TestPyPI/PyPI.
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.event.release.prerelease && 'testpypi' || 'pypi') }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build
        run: python -m pip install build

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        if: (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') || (github.event_name == 'release' && github.event.release.prerelease == false)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Publish to TestPyPI
        if: (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') || (github.event_name == 'release' && github.event.release.prerelease == true)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
