name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[langchain,dev]"

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Run platform harness
        run: |
          python scripts/platform_harness.py \
            --project /tmp/pheo-platform-harness-ci \
            --reset \
            --stress 2 \
            --review-count 3 \
            --ui-smoke \
            --wheel-smoke

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Scan for common secret patterns
        run: |
          set -euo pipefail
          PATTERNS='(sk-[A-Za-z0-9_-]{20,}|sk-or-v1-[A-Za-z0-9_-]{20,}|GOCSPX-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY|xox[baprs]-[A-Za-z0-9-]{20,}|gh[pousr]_[A-Za-z0-9_]{30,})'
          if rg -i -n "$PATTERNS" . \
            --glob '!.git/**' \
            --glob '!.github/workflows/**'; then
            echo "Potential secret pattern found in tracked files."
            exit 1
          fi
          echo "No obvious secret patterns in code files."
